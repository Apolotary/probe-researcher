<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Inter, -apple-system, sans-serif" font-size="10">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1d2c"/>
    </marker>
    <style>
      .stage { fill: #f0ece4; stroke: #1a1d2c; stroke-width: 0.8; rx: 3; ry: 3; }
      .stage-opus { fill: #e8ecf7; }
      .stage-sonnet { fill: #f3e8ef; }
      .branch-a { fill: #e8f3ff; stroke: #1B365D; }
      .branch-b { fill: #f7ecf5; stroke: #7a2d5a; }
      .branch-c { fill: #fff5dd; stroke: #8a6500; }
      .blocked { fill: #ffe3e0; stroke: #9e2e22; }
      .surviving { fill: #e1f5e0; stroke: #1f6b1e; }
      .label { fill: #1a1d2c; font-weight: 500; }
      .sublabel { fill: #555; font-size: 8.5px; }
      .arrow { stroke: #1a1d2c; stroke-width: 0.8; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #c5c0b0; stroke-width: 0.5; stroke-dasharray: 2 2; }
    </style>
  </defs>

  <!-- Title strip -->
  <text x="12" y="18" font-size="11.5" font-weight="600" fill="#1a1d2c">Probe — pipeline</text>
  <text x="12" y="32" font-size="9" fill="#555">premise → three branches → adversarial review → guidebook</text>

  <!-- Input: premise -->
  <rect x="12" y="48" width="128" height="30" class="stage" rx="3" ry="3"/>
  <text x="76" y="64" text-anchor="middle" class="label">research premise</text>
  <text x="76" y="75" text-anchor="middle" class="sublabel">one sentence</text>

  <!-- Stage 1 -->
  <rect x="160" y="48" width="110" height="30" class="stage stage-opus" rx="3" ry="3"/>
  <text x="215" y="64" text-anchor="middle" class="label">1. premise</text>
  <text x="215" y="75" text-anchor="middle" class="sublabel">Opus 4.7</text>
  <line x1="140" y1="63" x2="158" y2="63" class="arrow"/>

  <!-- Stage 2 -->
  <rect x="290" y="48" width="110" height="30" class="stage stage-opus" rx="3" ry="3"/>
  <text x="345" y="64" text-anchor="middle" class="label">2. ideation</text>
  <text x="345" y="75" text-anchor="middle" class="sublabel">3 divergent branches</text>
  <line x1="270" y1="63" x2="288" y2="63" class="arrow"/>

  <!-- Fan-out: 3 branches -->
  <line x1="400" y1="63" x2="430" y2="63" class="arrow"/>
  <line x1="430" y1="63" x2="430" y2="110" class="divider"/>
  <line x1="430" y1="110" x2="450" y2="110" class="arrow"/>
  <line x1="430" y1="63" x2="450" y2="63" class="arrow"/>
  <line x1="430" y1="63" x2="430" y2="170" class="divider"/>
  <line x1="430" y1="170" x2="450" y2="170" class="arrow"/>

  <!-- Branch A row -->
  <rect x="452" y="48" width="58" height="30" class="stage branch-a"/>
  <text x="481" y="64" text-anchor="middle" class="label">│ A</text>
  <text x="481" y="75" text-anchor="middle" class="sublabel">formative</text>
  <rect x="516" y="48" width="120" height="30" class="stage blocked"/>
  <text x="576" y="64" text-anchor="middle" class="label">stages 3–5 → audit</text>
  <text x="576" y="75" text-anchor="middle" class="sublabel">BLOCKED: legibility.no_failure_signal</text>

  <!-- Branch B row -->
  <rect x="452" y="95" width="58" height="30" class="stage branch-b"/>
  <text x="481" y="111" text-anchor="middle" class="label">│ B</text>
  <text x="481" y="121" text-anchor="middle" class="sublabel">evaluative</text>
  <rect x="516" y="95" width="120" height="30" class="stage surviving"/>
  <text x="576" y="111" text-anchor="middle" class="label">3–5 → audit → reviewers</text>
  <text x="576" y="121" text-anchor="middle" class="sublabel">SURVIVING (human_judgment_required)</text>

  <!-- Branch C row -->
  <rect x="452" y="155" width="58" height="30" class="stage branch-c"/>
  <text x="481" y="170" text-anchor="middle" class="label">│ C</text>
  <text x="481" y="181" text-anchor="middle" class="sublabel">longitudinal</text>
  <rect x="516" y="155" width="120" height="30" class="stage blocked"/>
  <text x="576" y="170" text-anchor="middle" class="label">stages 3–5 → audit</text>
  <text x="576" y="181" text-anchor="middle" class="sublabel">BLOCKED: legibility.no_failure_signal</text>

  <!-- Reviewer panel detail (for Branch B only) -->
  <rect x="12" y="210" width="280" height="110" fill="#fafaf4" stroke="#c5c0b0" stroke-width="0.6" rx="3" ry="3"/>
  <text x="20" y="225" font-weight="600" fill="#1a1d2c" font-size="9.5">Stage 7 — adversarial review (branch B)</text>
  <text x="20" y="237" fill="#555" font-size="8.5">runs sequentially, all Opus 4.7</text>
  <rect x="20" y="246" width="120" height="22" class="stage stage-opus"/>
  <text x="80" y="261" text-anchor="middle" font-size="9" class="label">7a methodologist</text>
  <rect x="148" y="246" width="120" height="22" class="stage stage-opus"/>
  <text x="208" y="261" text-anchor="middle" font-size="9" class="label">7b accessibility</text>
  <rect x="20" y="274" width="120" height="22" class="stage stage-opus"/>
  <text x="80" y="289" text-anchor="middle" font-size="9" class="label">7c novelty hawk</text>
  <rect x="148" y="274" width="120" height="22" class="stage stage-opus"/>
  <text x="208" y="289" text-anchor="middle" font-size="9" class="label">7d meta-reviewer</text>
  <text x="20" y="312" font-size="8.5" fill="#555">all four receive the same branch context; meta-reviewer preserves disagreement</text>

  <!-- Deep audit detail -->
  <rect x="308" y="210" width="220" height="110" fill="#fafaf4" stroke="#c5c0b0" stroke-width="0.6" rx="3" ry="3"/>
  <text x="316" y="225" font-weight="600" fill="#1a1d2c" font-size="9.5">probe audit-deep (Managed Agents)</text>
  <text x="316" y="238" fill="#555" font-size="8.5">agent_toolset_20260401: bash, grep,</text>
  <text x="316" y="249" fill="#555" font-size="8.5">file ops, web — inside cloud container</text>
  <text x="316" y="268" fill="#1a1d2c" font-size="8.5" font-weight="500">demo run (branch B): 21 tool calls</text>
  <text x="316" y="282" fill="#555" font-size="8">→ verified 5 shallow findings</text>
  <text x="316" y="294" fill="#555" font-size="8">→ surfaced 9 new findings</text>
  <text x="316" y="306" fill="#555" font-size="8">→ measured announcement delta = 3.67s</text>

  <!-- Linter detail -->
  <rect x="544" y="210" width="200" height="110" fill="#fafaf4" stroke="#c5c0b0" stroke-width="0.6" rx="3" ry="3"/>
  <text x="552" y="225" font-weight="600" fill="#1a1d2c" font-size="9.5">src/lint/provenance.ts</text>
  <text x="552" y="237" fill="#555" font-size="8.5">markdown-AST walk; fails build on:</text>
  <text x="552" y="252" fill="#1a1d2c" font-size="8">· any para/bullet/blockquote/tablerow</text>
  <text x="552" y="263" fill="#1a1d2c" font-size="8">  without a provenance tag</text>
  <text x="552" y="277" fill="#1a1d2c" font-size="8">· [SIMULATION_REHEARSAL] w/ evidence lang</text>
  <text x="552" y="288" fill="#1a1d2c" font-size="8">· [AGENT_INFERENCE] w/ predictive verbs</text>
  <text x="552" y="299" fill="#1a1d2c" font-size="8">· heading w/ "Expected outcomes"/"Results"</text>
  <text x="552" y="312" fill="#1a1d2c" font-size="8">· [SOURCE_CARD:id] w/ unknown id</text>

  <!-- Stage 8 (guidebook) -->
  <rect x="654" y="95" width="94" height="30" class="stage stage-opus"/>
  <text x="701" y="111" text-anchor="middle" class="label">8. guidebook</text>
  <text x="701" y="121" text-anchor="middle" class="sublabel">Opus 4.7</text>
  <line x1="636" y1="110" x2="652" y2="110" class="arrow"/>
  <!-- Final artifact -->
  <rect x="636" y="155" width="112" height="30" class="stage surviving"/>
  <text x="692" y="170" text-anchor="middle" class="label">PROBE_GUIDEBOOK.md</text>
  <text x="692" y="181" text-anchor="middle" class="sublabel">provenance-tagged</text>
  <line x1="701" y1="125" x2="701" y2="153" class="arrow"/>

</svg>
