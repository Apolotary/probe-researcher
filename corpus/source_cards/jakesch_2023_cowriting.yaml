summary: >-
  A pre-registered CHI 2023 study (n=1,506) showing that co-writing with a
  language model configured with a built-in viewpoint shifts both the opinions
  expressed in participants' writing and their subsequent attitudes toward the
  topic.
allowed_claims:
  - "In a pre-registered experiment with 1,506 participants writing about whether social media is good for society, using an opinionated AI writing assistant changed the opinion content of participants' written posts in the direction of the model's configured stance."
  - "After the co-writing task, participants' opinions on the target topic, measured in a subsequent attitude survey, had shifted in the direction of the language model's bias — a 'latent persuasion' effect extending beyond the text to the user's own views."
  - "The effect occurred even though participants were not told the assistant held a viewpoint, and most participants were unaware they were being influenced."
  - "The authors argue that built-in opinions of AI language technologies need to be monitored and engineered carefully because they can influence users' views at scale."
