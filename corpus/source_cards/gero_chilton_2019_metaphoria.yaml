summary: >-
  A CHI 2019 paper introducing Metaphoria, an interactive tool that generates
  candidate metaphorical connections between two user-supplied concepts to
  scaffold writers' figurative-language ideation rather than produce finished
  metaphors.
allowed_claims:
  - "Gero and Chilton (2019) introduce Metaphoria, an algorithmic writing companion that, given a target concept and a vehicle concept, proposes candidate connections the writer can develop into metaphors."
  - "The tool is positioned as a suggestion-and-inspiration aid for the writer's own figurative reasoning rather than an end-to-end metaphor generator, aligning with a creativity-support rather than full-automation design stance."
  - "Metaphoria was evaluated with writers, and the authors report that algorithmically suggested connections can expand the space of metaphors writers consider without replacing their authorial judgment."
  - "The paper is a canonical CHI reference for algorithmic support of figurative-language creation and is widely cited in subsequent work on LLM-era co-writing and creativity-support tools."
