summary: >-
  An IUI 2018 study of a "machine in the loop" creative writing system in
  which a neural language model offers on-demand suggestions that writers can
  accept, edit, or ignore, evaluated through two case studies: short-form
  slogan writing and longer-form story writing.
allowed_claims:
  - "Clark et al. (2018) built a 'machine in the loop' interface in which a neural language model proposes optional next-sentence or next-phrase suggestions that the human writer can accept, edit, or ignore while drafting."
  - "The system was evaluated in two case studies covering a short creative task (slogan writing) and a longer narrative task (story writing), contrasting a with-suggestions condition against a no-suggestions baseline."
  - "Writers reported that machine suggestions were more useful for longer, open-ended story writing than for the tightly constrained slogan task, where suggestions were more often judged off-topic or unhelpful."
  - "The paper introduces the 'machine in the loop' framing — a human-led creative pipeline in which the AI is an on-demand collaborator rather than an autonomous generator — which has since become a canonical reference point for creativity-support tool research."
