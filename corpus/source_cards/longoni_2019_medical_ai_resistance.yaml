summary: >-
  A Journal of Consumer Research paper documenting that consumers are reluctant
  to use healthcare delivered by AI rather than human providers, with
  'uniqueness neglect' — the belief that AI cannot account for one's unique
  characteristics — identified as the primary psychological mechanism.
allowed_claims:
  - "Across multiple studies using real and hypothetical choices, consumers are less willing to utilize healthcare provided by an AI provider than by a human provider, even when the AI is stipulated to perform equally or better."
  - "The primary mechanism driving this resistance is 'uniqueness neglect' — a belief that AI, unlike humans, cannot adequately account for consumers' unique characteristics and circumstances."
  - "Resistance is stronger among consumers who perceive themselves as more unique or as having more idiosyncratic medical needs."
  - "Resistance is attenuated when the AI is framed as providing personalized (rather than standardized) care, when consumers decide for others rather than themselves, or when the AI serves a supporting role to a human provider rather than replacing one."
  - "Consumers assign lower monetary value (willingness-to-pay) to AI-delivered medical services and are less sensitive to differences in provider-performance quality metrics when the provider is an AI."
