summary: >-
  A book-chapter framework arguing that four technological affordances —
  Modality, Agency, Interactivity, and Navigability (MAIN) — trigger cognitive
  heuristics that influence users' credibility judgments of digital information
  automatically and often below conscious deliberation.
allowed_claims:
  - "Four classes of technological affordance — Modality, Agency, Interactivity, and Navigability — shape users' credibility judgments of digital content by cueing cognitive heuristics rather than by supporting fully deliberative evaluation."
  - "Credibility assessment in digital media is not purely a conscious, effortful process; a great deal of automaticity governs users' (and particularly youths') credibility judgments, with interface surface features serving as shortcut cues."
  - "Specific affordances map to specific heuristics — e.g., agency cues can invoke an authority heuristic or a 'machine heuristic' that changes perceived trustworthiness independently of actual source quality."
  - "Because these heuristics can be triggered by superficial design cues, structural and technological features of a system can bias credibility judgments in ways users do not notice, carrying implications for media literacy and interface design."
