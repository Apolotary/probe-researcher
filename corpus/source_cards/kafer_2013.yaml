summary: >-
  A monograph arguing for a political/relational model of disability that
  rejects the 'curative imaginary' and builds coalitions across feminist,
  queer, and disability politics.
allowed_claims:
  - "Kafer develops a 'political/relational' model of disability in contrast to both the medical model and the British social model."
  - "She critiques the 'curative imaginary' — the assumption that disabled futures must be futures without disability."
  - "She argues that normative constructions of 'the future' are used to naturalize compulsory able-bodiedness and able-mindedness."
  - "She places disability studies in explicit coalition with feminist, queer, environmental-justice, and reproductive-justice scholarship."
