summary: >-
  A polemical essay introducing 'conviviality' as a criterion for tools that
  enhance autonomy, and 'radical monopoly' as a critique of dominant technologies
  that foreclose alternatives.
allowed_claims:
  - "Illich defines conviviality as 'autonomous and creative intercourse among persons, and of persons with their environment' enabled by tools that remain responsibly limited."
  - "He introduces 'radical monopoly' to describe how a dominant technology (his canonical example is the automobile) can reshape society so that non-users become marginalized regardless of consumer choice."
  - "He argues that tools past a certain threshold of scale and complexity reverse from serving human purposes to conditioning humans to serve the tool."
  - "He distinguishes convivial tools from industrial tools on the basis of whether they expand or contract the range of autonomous action available to their users."
