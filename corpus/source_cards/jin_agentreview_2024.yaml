verification_notes: >-
  DOI resolves to ACL Anthology on 2026-04-22. Title, authors, and pages
  confirmed via ACL Anthology, arXiv:2406.12708, and project site. The ACL
  Anthology title is 'Exploring Peer Review Dynamics with LLM Agents' — earlier
  arXiv v1 used 'Exploring Academic Peer Review with LLM Agent'.
summary: >-
  Introduces AgentReview, an LLM-agent-based simulation framework modelling
  reviewers, authors, and area chairs to study how latent factors (biases,
  commitment, responsibility) shift peer-review outcomes.
allowed_claims:
  - "The authors introduce an LLM-agent-based simulation of the peer-review process that models reviewer, author, and area-chair roles."
  - "They release a dataset of more than 53,800 generated reviews, rebuttals, updated reviews, meta-reviews, and final decisions."
  - "They report that reviewer biases (simulated via agent prompt variations) can account for up to ~37.1% variation in paper decisions in their simulation."
  - "They connect observed agent behaviors to sociological theories including social-influence theory, altruism fatigue, and authority bias."
tags: ["LLM_agents", "peer_review", "simulation", "review_bias"]
