summary: >-
  A survey paper mapping three 'making' approaches in codesign (probes,
  generative toolkits, prototypes) against distinctions in mindset, time
  horizon, and design intent.
allowed_claims:
  - "The authors identify three distinct approaches to 'making' in codesign: cultural probes, generative toolkits, and design prototypes."
  - "They distinguish between a 'designing for people' mindset and a 'designing with people' (participatory) mindset."
  - "They position each approach along temporal focus (the present, near future, speculative future) and design intent (provoking, engaging, serving)."
  - "Probes are framed as instruments for inspiration and dialogue rather than for extracting generalizable user data."
