summary: >-
  Develops a design-level account of how AI decision-support can erode
  domain-specific autonomy and proposes design patterns to preserve users'
  skilled competence and authentic value-formation.
allowed_claims:
  - "The paper analyses 'domain-specific autonomy' as comprising two components: skilled competence and authentic value-formation within a domain of expertise."
  - "The authors argue that AI decision-support can erode domain-specific autonomy via absent failure indicators and unconscious value shifts."
  - "They illustrate the argument with cases drawn from medical, financial, and educational decision-support contexts."
  - "They propose design patterns (e.g., role specification, defeater mechanisms, reflective-practice support) intended to preserve user agency while leveraging AI capabilities."
