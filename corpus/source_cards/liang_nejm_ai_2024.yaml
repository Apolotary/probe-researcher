summary: >-
  A large-scale empirical study comparing GPT-4-generated feedback on scientific
  manuscripts to human peer-review feedback, combining retrospective corpus
  analysis with a prospective user study.
allowed_claims:
  - "The authors analyze GPT-4 feedback against human reviews on 3,096 Nature-family papers and 1,709 ICLR papers."
  - "They report average overlap of points raised between GPT-4 and human reviewers of 30.85% for Nature papers and 39.23% for ICLR papers, comparable to human-human overlap in the same corpora."
  - "In a prospective user study with 308 researchers across 110 US institutions, 57.4% rated GPT-4 feedback as helpful or very helpful."
  - "The authors conclude that LLM feedback can complement (but not replace) human expert review, especially when timely expert feedback is unavailable or at early manuscript stages."
