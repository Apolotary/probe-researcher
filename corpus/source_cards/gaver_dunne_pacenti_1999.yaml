summary: >-
  Introduces 'cultural probes' as a designer-oriented method of provocative
  artefact packets (maps, postcards, cameras, diaries) given to users to inspire
  rather than systematically document design work.
allowed_claims:
  - "The authors describe cultural probes as packages of artefacts (maps, postcards, disposable cameras, diaries) designed to elicit inspirational fragments from participants."
  - "The method was developed in the context of an EU-funded project studying elderly people in three European communities (Majorstua/Oslo, Bijlmer/Amsterdam, Peccioli)."
  - "Probes are framed as tools to build designer empathy and provoke design ideas, not as a data-collection method yielding objective user requirements."
  - "The approach embraces uncertainty and partial returns rather than seeking comprehensive coverage of user behavior."
