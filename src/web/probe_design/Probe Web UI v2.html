<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- The shell is served at /ui (no trailing slash). Relative
     <script src="probe-…"> would otherwise resolve to /probe-…
     instead of /ui/probe-…. Anchoring with <base> fixes that for
     every relative URL on the page (scripts, iframe srcs, fetches). -->
<base href="/ui/" />
<title>Probe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap');
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    background: #0e1014;
    color: #d8d4c9;
    font-size: 14px;
    line-height: 1.4;
  }
  #root { height: 100vh; }
  textarea, input { font-family: inherit; }
  /* Prose helper — long-form text on the home page (suggestion
     summaries) and any embedded docs use sans + the 68ch measure
     cap from the readability audit (rec §02 + §03). Mono stays as
     the body default for chrome / data / labels. */
  .probe-prose {
    font-family: 'Inter Tight', 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.62;
    letter-spacing: 0.005em;
    color: #d8d4c9;
    max-width: 68ch;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #252a33; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #2f3540; }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 240ms ease-out both; }
  .pulse-dot { animation: blink 1s steps(1) infinite; }
  .spin { animation: spin 1.2s linear infinite; display: inline-block; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="probe-tokens.js"></script>
<script type="text/babel" src="probe-shell-data.jsx"></script>
<script type="text/babel" src="probe-sidebar.jsx"></script>
<script type="text/babel" src="probe-home.jsx"></script>
<script type="text/babel" src="probe-shell.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<window.ProbeShell />);
</script>
</body>
</html>
