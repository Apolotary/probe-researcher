<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Probe · startup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap');
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    background: #0f1419;
    color: #c5c8d4;
    font-size: 14px;
    line-height: 1.4;
    overflow-x: auto;
  }
  #root { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ASCII logo for PROBE — block style, double-stroke for that LazyVim feel.
const LOGO_BLOCK = String.raw`
██████╗  ██████╗   ██████╗  ██████╗  ███████╗
██╔══██╗ ██╔══██╗ ██╔═══██╗ ██╔══██╗ ██╔════╝
██████╔╝ ██████╔╝ ██║   ██║ ██████╔╝ █████╗
██╔═══╝  ██╔══██╗ ██║   ██║ ██╔══██╗ ██╔══╝
██║      ██║  ██║ ╚██████╔╝ ██████╔╝ ███████╗
╚═╝      ╚═╝  ╚═╝  ╚═════╝  ╚═════╝  ╚══════╝
`;

const LOGO_OUTLINE = String.raw`
 ┏━━━━━┓ ┏━━━━━┓ ┏━━━━━┓ ┏━━━━━┓ ┏━━━━━━┓
 ┃ ┏━┓ ┃ ┃ ┏━┓ ┃ ┃ ┏━┓ ┃ ┃ ┏━┓ ┃ ┃ ┏━━━━┛
 ┃ ┗━┛ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┗━┛ ┃ ┃ ┗━━┓
 ┃ ┏━━━┛ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┃ ┏━┓ ┃ ┃ ┏━━┛
 ┃ ┃     ┃ ┗━┛ ┃ ┃ ┗━┛ ┃ ┃ ┗━┛ ┃ ┃ ┗━━━━┓
 ┗━┛     ┗━━━━━┛ ┗━━━━━┛ ┗━━━━━┛ ┗━━━━━━━┛
`;

const LOGO_SLANT = String.raw`
   ___           ___           ___           ___           ___
  /\  \         /\  \         /\  \         /\  \         /\  \
 /::\  \       /::\  \       /::\  \       /::\  \       /::\  \
/:/\:\  \     /:/\:\  \     /:/\:\  \     /:/\:\  \     /:/\:\  \
\:\~\:\  \   /::\~\:\  \   /:/  \:\  \   /::\~\:\__\   /::\~\:\  \
 \:\ \:\__\ /:/\:\ \:\__\ /:/__/ \:\__\ /:/\:\ \:|__| /:/\:\ \:\__\
  \:\/:/  / \/__\:\/:/  / \:\  \ /:/  / \:\~\:\/:/  / \:\~\:\ \/__/
   \::/  /       \::/  /   \:\  /:/  /   \:\ \::/  /   \:\ \:\__\
   /:/  /        /:/  /     \:\/:/  /     \:\/:/  /     \:\ \/__/
  /:/  /        /:/  /       \::/  /       \::/__/       \:\__\
  \/__/         \/__/         \/__/         ~~            \/__/
`;

// Heredoc-style "PROBE" pixel-block logo
const LOGO_PIXEL = String.raw`
█▀█ █▀█ █▀█ █▄▄ █▀▀
█▀▀ █▀▄ █▄█ █▄█ ██▄
`;

// Recent runs to fill space
const recents = [
  { id: 'demo_run',     premise: 'evaluate an ARIA-live AI-disclosure banner for BLV screen-reader users', when: '2d', cost: 5.12 },
  { id: 'civic-trust',  premise: 'measure how source provenance affects trust in municipal-budget summaries', when: '5d', cost: 4.04 },
  { id: 'pair-debug',   premise: 'study pair-programming with an AI agent under high-incident pressure',     when: '12d', cost: 7.31 },
];

const menu = [
  { key: 'n', icon: '+', label: 'New project',     hint: 'state a premise · open studio' },
  { key: 'o', icon: '↗', label: 'Open project',    hint: 'pick from local runs' },
  { key: 'r', icon: '↻', label: 'Recent',          hint: '3 runs · last 12 days' },
  { key: 'd', icon: '▶', label: 'Replay demo_run', hint: 'cached · zero API cost' },
  { key: 'c', icon: '⚙', label: 'Config',          hint: '~/.config/probe/probe.toml' },
  { key: 'h', icon: '?', label: 'Help & docs',     hint: 'man probe · :help' },
  { key: 'q', icon: '×', label: 'Quit',            hint: 'goodbye' },
];

const palette = {
  bg:      '#0f1419',
  bg2:     '#161b22',
  ink:     '#c5c8d4',
  ink2:    '#8b93a7',
  ink3:    '#5c6678',
  amber:   '#d9a548',
  amberSoft: '#7d6128',
  rose:    '#e26e6e',
  moss:    '#7fb069',
  blue:    '#7aa2f7',
  cyan:    '#7dcfff',
  brand:   '#d9a548',  // warm amber as Probe's signal color
  brandSoft: 'rgba(217, 165, 72, 0.14)',
  rule:    '#1f2530',
};

function Startup() {
  const [variant, setVariant] = useState('A');
  const [hover, setHover] = useState(null);
  const [pressed, setPressed] = useState(null);
  const [ts, setTs] = useState(Date.now());

  // Keyboard handlers
  useEffect(() => {
    const onKey = (e) => {
      const k = e.key.toLowerCase();
      const item = menu.find((m) => m.key === k);
      if (item) {
        setPressed(item.key);
        setTimeout(() => setPressed(null), 200);
      }
      if (k === '1') setVariant('A');
      if (k === '2') setVariant('B');
      if (k === '3') setVariant('C');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  useEffect(() => {
    const iv = setInterval(() => setTs(Date.now()), 1000);
    return () => clearInterval(iv);
  }, []);

  return (
    <div style={{ minHeight: '100vh', background: palette.bg, color: palette.ink }}>
      {/* Variant switcher (chrome) */}
      <div style={{
        position: 'fixed', top: 12, right: 16, zIndex: 10, display: 'flex', gap: 6, fontSize: 11,
        color: palette.ink3,
      }}>
        {['A', 'B', 'C'].map((v) => (
          <button key={v} onClick={() => setVariant(v)} style={{
            background: variant === v ? palette.brandSoft : 'transparent',
            border: `1px solid ${variant === v ? palette.brand : palette.rule}`,
            color: variant === v ? palette.brand : palette.ink2,
            fontFamily: 'inherit', fontSize: 11, padding: '4px 10px', borderRadius: 3,
            cursor: 'pointer',
          }}>variant {v}</button>
        ))}
      </div>

      {variant === 'A' && <VariantA hover={hover} setHover={setHover} pressed={pressed} ts={ts} />}
      {variant === 'B' && <VariantB hover={hover} setHover={setHover} pressed={pressed} ts={ts} />}
      {variant === 'C' && <VariantC hover={hover} setHover={setHover} pressed={pressed} ts={ts} />}
    </div>
  );
}

// ───────── VARIANT A — closest to LazyVim: minimal, centered, big logo, hotkey column ─────────
function VariantA({ hover, setHover, pressed, ts }) {
  const items = menu.slice(0, 5).concat([{ key: 'q', icon: '×', label: 'Quit', hint: 'goodbye' }]);
  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 80 }}>
      <Logo />
      <div style={{ marginTop: 8, color: palette.ink3, fontSize: 12.5, letterSpacing: '0.04em' }}>
        v0.4.2 · the agentic research-design pipeline
      </div>

      <div style={{ marginTop: 56, width: 520, display: 'flex', flexDirection: 'column' }}>
        {items.map((m) => {
          const isHover = hover === m.key;
          const isPressed = pressed === m.key;
          return (
            <button
              key={m.key}
              onMouseEnter={() => setHover(m.key)}
              onMouseLeave={() => setHover(null)}
              onClick={() => {}}
              style={{
                display: 'grid', gridTemplateColumns: '28px 1fr 32px',
                alignItems: 'center', gap: 12,
                padding: '8px 14px',
                background: isPressed ? palette.brandSoft : 'transparent',
                border: 'none', borderLeft: `2px solid ${isHover || isPressed ? palette.brand : 'transparent'}`,
                color: 'inherit', fontFamily: 'inherit', fontSize: 14,
                cursor: 'pointer', textAlign: 'left',
                transition: 'background 80ms, border-color 80ms',
              }}
            >
              <span style={{ color: isHover ? palette.brand : palette.ink2, fontSize: 14 }}>{m.icon}</span>
              <span style={{ color: palette.ink }}>
                <span style={{
                  background: isHover ? palette.brand : 'transparent',
                  color: isHover ? palette.bg : palette.ink,
                  padding: isHover ? '0 2px' : '0',
                }}>{m.label[0]}</span>{m.label.slice(1)}
              </span>
              <span style={{ color: palette.ink3, fontSize: 13, textAlign: 'right' }}>{m.key}</span>
            </button>
          );
        })}
      </div>

      <div style={{ marginTop: 36, color: palette.ink3, fontSize: 12.5 }}>
        <span style={{ color: palette.amber, marginRight: 6 }}>⚡</span>
        Probe armed in 84ms · 17 patterns · 3 review templates · doctor ok
      </div>
    </div>
  );
}

// ───────── VARIANT B — terminal frame, pretends to be a real TUI window ─────────
function VariantB({ hover, setHover, pressed, ts }) {
  const time = new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  const items = menu;
  return (
    <div style={{ minHeight: '100vh', padding: '32px', display: 'flex', justifyContent: 'center' }}>
      <div style={{
        width: 980, maxWidth: '100%',
        border: `1px solid ${palette.rule}`, borderRadius: 8, overflow: 'hidden',
        background: palette.bg, boxShadow: '0 24px 80px -20px rgba(0,0,0,0.6)',
      }}>
        {/* terminal chrome */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10, padding: '8px 14px',
          background: palette.bg2, borderBottom: `1px solid ${palette.rule}`,
        }}>
          <span style={{ width: 11, height: 11, borderRadius: '50%', background: '#ff5f57' }} />
          <span style={{ width: 11, height: 11, borderRadius: '50%', background: '#febc2e' }} />
          <span style={{ width: 11, height: 11, borderRadius: '50%', background: '#28c840' }} />
          <span style={{ marginLeft: 12, color: palette.ink3, fontSize: 12 }}>~/research/probe — probe — 96×34</span>
          <span style={{ marginLeft: 'auto', color: palette.ink3, fontSize: 11.5 }}>{time}</span>
        </div>

        {/* content */}
        <div style={{ padding: '40px 32px 28px', display: 'grid', gridTemplateColumns: '1fr 320px', gap: 32 }}>
          <div>
            <Logo />
            <div style={{ color: palette.ink3, fontSize: 12, marginTop: 8 }}>
              <span style={{ color: palette.amber }}>$</span> probe <span style={{ color: palette.ink2 }}>--no-args</span>
              <span style={{ marginLeft: 14 }}>v0.4.2 · pid 38291 · python 3.12</span>
            </div>

            <div style={{ marginTop: 36 }}>
              {items.map((m) => {
                const isHover = hover === m.key;
                const isPressed = pressed === m.key;
                return (
                  <button
                    key={m.key}
                    onMouseEnter={() => setHover(m.key)}
                    onMouseLeave={() => setHover(null)}
                    style={{
                      display: 'grid', gridTemplateColumns: '24px 180px 1fr 24px',
                      alignItems: 'center', gap: 14, width: '100%',
                      padding: '7px 12px',
                      background: isPressed ? palette.brandSoft : isHover ? palette.bg2 : 'transparent',
                      border: 'none', borderLeft: `2px solid ${isHover || isPressed ? palette.brand : 'transparent'}`,
                      color: 'inherit', fontFamily: 'inherit', fontSize: 13.5,
                      cursor: 'pointer', textAlign: 'left',
                    }}
                  >
                    <span style={{ color: isHover ? palette.brand : palette.ink2 }}>{m.icon}</span>
                    <span>
                      <span style={{
                        background: isHover ? palette.brand : 'transparent',
                        color: isHover ? palette.bg : palette.ink,
                        padding: '0 2px',
                      }}>{m.label[0]}</span>{m.label.slice(1)}
                    </span>
                    <span style={{ color: palette.ink3, fontSize: 12 }}>{m.hint}</span>
                    <span style={{
                      color: palette.ink3, fontSize: 12, textAlign: 'center',
                      border: `1px solid ${palette.rule}`, borderRadius: 3, padding: '0 6px',
                      lineHeight: '18px',
                    }}>{m.key}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* right column — recents + status */}
          <div>
            <div style={{ color: palette.ink3, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 10 }}>
              recent runs
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {recents.map((r) => (
                <div key={r.id} style={{ borderLeft: `2px solid ${palette.rule}`, paddingLeft: 12, cursor: 'pointer' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11.5 }}>
                    <span style={{ color: palette.cyan }}>{r.id}</span>
                    <span style={{ color: palette.ink3 }}>{r.when} · ${r.cost.toFixed(2)}</span>
                  </div>
                  <div style={{ color: palette.ink2, fontSize: 12, marginTop: 4, lineHeight: 1.45 }}>
                    {r.premise.length > 60 ? r.premise.slice(0, 58) + '…' : r.premise}
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginTop: 28, padding: 12, background: palette.bg2, border: `1px solid ${palette.rule}`, borderRadius: 4 }}>
              <div style={{ color: palette.ink3, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}>doctor</div>
              <div style={{ marginTop: 8, fontSize: 12, lineHeight: 1.7 }}>
                <Doc ok label="anthropic api key"/>
                <Doc ok label="local cache · 412 MB"/>
                <Doc ok label="patterns/ · 17 rules"/>
                <Doc warn label="Pandoc not found"/>
              </div>
            </div>
          </div>
        </div>

        {/* footer status bar */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 14,
          padding: '6px 14px', background: palette.bg2, borderTop: `1px solid ${palette.rule}`,
          fontSize: 11.5, color: palette.ink3,
        }}>
          <span style={{ color: palette.amber }}>⚡ 84ms</span>
          <span>17 patterns</span>
          <span>3 templates</span>
          <span style={{ marginLeft: 'auto' }}>press a key, or click a row</span>
        </div>
      </div>
    </div>
  );
}

function Doc({ ok, warn, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ color: ok ? palette.moss : warn ? palette.amber : palette.rose, width: 14 }}>
        {ok ? '✓' : warn ? '!' : '✗'}
      </span>
      <span style={{ color: palette.ink2 }}>{label}</span>
    </div>
  );
}

// ───────── VARIANT C — full-bleed, two columns, agent feel (chat-on-the-right preview) ─────────
function VariantC({ hover, setHover, pressed }) {
  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 64 }}>
      <Logo flavor="outline" />
      <div style={{ marginTop: 6, color: palette.ink3, fontSize: 12.5 }}>
        an agentic research-design pipeline
      </div>

      <div style={{ marginTop: 48, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, width: 880 }}>
        {/* left column: menu */}
        <div>
          <SectionTitle>start</SectionTitle>
          {[menu[0], menu[1], menu[2]].map((m) => (
            <Row key={m.key} m={m} hover={hover} setHover={setHover} pressed={pressed} />
          ))}
          <SectionTitle style={{ marginTop: 32 }}>app</SectionTitle>
          {[menu[3], menu[4], menu[5], menu[6]].map((m) => (
            <Row key={m.key} m={m} hover={hover} setHover={setHover} pressed={pressed} />
          ))}
        </div>

        {/* right column: tip / preview */}
        <div>
          <SectionTitle>tip</SectionTitle>
          <div style={{
            border: `1px solid ${palette.rule}`, borderRadius: 4, padding: '14px 16px',
            background: palette.bg2, fontSize: 12.5, lineHeight: 1.6, color: palette.ink2,
          }}>
            <div style={{ color: palette.amber, marginBottom: 6 }}>// the posture</div>
            Probe is a <span style={{ color: palette.ink }}>skeptical collaborator</span>, not a delegate.
            It pauses at every stage, makes its reasoning auditable, and hands the keyboard back.
            <div style={{ marginTop: 10, color: palette.ink3 }}>
              press <Kbd>n</Kbd> to begin, or <Kbd>d</Kbd> to replay the canonical demo run.
            </div>
          </div>

          <SectionTitle style={{ marginTop: 28 }}>recent</SectionTitle>
          {recents.map((r) => (
            <div key={r.id} style={{
              padding: '8px 0', borderTop: `1px solid ${palette.rule}`, fontSize: 12,
              display: 'grid', gridTemplateColumns: '1fr auto', gap: 12, alignItems: 'baseline',
            }}>
              <div>
                <div style={{ color: palette.cyan }}>{r.id}</div>
                <div style={{ color: palette.ink3, marginTop: 2 }}>
                  {r.premise.length > 56 ? r.premise.slice(0, 54) + '…' : r.premise}
                </div>
              </div>
              <div style={{ color: palette.ink3, fontSize: 11 }}>{r.when}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginTop: 48, color: palette.ink3, fontSize: 12 }}>
        <span style={{ color: palette.amber, marginRight: 6 }}>⚡</span>
        ready in 84ms · 17 patterns · 3 review templates
      </div>
    </div>
  );
}

function SectionTitle({ children, style }) {
  return (
    <div style={{
      color: palette.ink3, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em',
      marginBottom: 10, ...style,
    }}>{children}</div>
  );
}

function Row({ m, hover, setHover, pressed }) {
  const isHover = hover === m.key;
  const isPressed = pressed === m.key;
  return (
    <button
      onMouseEnter={() => setHover(m.key)}
      onMouseLeave={() => setHover(null)}
      style={{
        display: 'grid', gridTemplateColumns: '20px 1fr 22px', alignItems: 'center', gap: 12, width: '100%',
        padding: '7px 10px',
        background: isPressed ? palette.brandSoft : isHover ? palette.bg2 : 'transparent',
        border: 'none', borderLeft: `2px solid ${isHover || isPressed ? palette.brand : 'transparent'}`,
        color: 'inherit', fontFamily: 'inherit', fontSize: 13.5, cursor: 'pointer', textAlign: 'left',
      }}>
      <span style={{ color: isHover ? palette.brand : palette.ink2 }}>{m.icon}</span>
      <span>
        <span style={{
          background: isHover ? palette.brand : 'transparent',
          color: isHover ? palette.bg : palette.ink,
          padding: '0 2px',
        }}>{m.label[0]}</span>{m.label.slice(1)}
      </span>
      <span style={{ color: palette.ink3, fontSize: 12, textAlign: 'right' }}>{m.key}</span>
    </button>
  );
}

function Kbd({ children }) {
  return (
    <span style={{
      display: 'inline-block', padding: '0 6px', margin: '0 1px',
      border: `1px solid ${palette.rule}`, borderRadius: 3, fontSize: 11.5,
      color: palette.ink, background: palette.bg2,
    }}>{children}</span>
  );
}

function Logo({ flavor = 'block' }) {
  const ascii = flavor === 'outline' ? LOGO_OUTLINE : LOGO_BLOCK;
  return (
    <div style={{ position: 'relative' }}>
      <pre style={{
        margin: 0, color: palette.brand,
        fontSize: 14, lineHeight: 1.05, letterSpacing: 0,
        textShadow: `0 0 12px ${palette.brandSoft}`,
        whiteSpace: 'pre',
      }}>{ascii}</pre>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Startup />);
</script>
</body>
</html>
